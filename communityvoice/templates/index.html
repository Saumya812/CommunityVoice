<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CommunityVoice — Get Help Today</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f1117;--surface:#181c27;--surface2:#1e2335;--border:rgba(255,255,255,0.08);
    --accent:#4fd1a5;--accent2:#7b9ef4;--text:#e8eaf0;--muted:#6b7280;
    --user-bubble:#2a3a5c;--bot-bubble:#1a2535;--high:#f87171;
  }
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 10%,rgba(79,209,165,0.07) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 80% 90%,rgba(123,158,244,0.07) 0%,transparent 60%);pointer-events:none;z-index:0}
  header{width:100%;max-width:720px;padding:2.5rem 1.5rem 1.5rem;position:relative;z-index:1}
  .logo{display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem}
  .logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
  .logo h1{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:500;letter-spacing:-.02em}
  .logo h1 span{color:var(--accent)}
  .tagline{font-size:.85rem;color:var(--muted);margin-left:calc(38px + .75rem)}
  .staff-link{position:absolute;top:2.5rem;right:1.5rem;font-size:.78rem;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:.3rem .8rem;border-radius:20px;transition:all .2s}
  .staff-link:hover{color:var(--text);border-color:var(--accent)}
  .chat-wrap{width:100%;max-width:720px;padding:0 1.5rem 2rem;position:relative;z-index:1;flex:1;display:flex;flex-direction:column}
  .chat-window{background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;flex:1;display:flex;flex-direction:column;min-height:500px;box-shadow:0 0 0 1px rgba(255,255,255,.03),0 24px 48px rgba(0,0,0,.4)}
  .chat-messages{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;scroll-behavior:smooth}
  .chat-messages::-webkit-scrollbar{width:4px}
  .chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .message{display:flex;gap:.75rem;animation:fadeUp .3s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .message.user{flex-direction:row-reverse}
  .avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;margin-top:2px}
  .avatar.bot{background:linear-gradient(135deg,var(--accent),var(--accent2))}
  .avatar.user{background:var(--user-bubble);border:1px solid var(--border)}
  .bubble{max-width:78%;padding:.85rem 1.1rem;border-radius:16px;font-size:.92rem;line-height:1.6;white-space:pre-wrap}
  .message.bot .bubble{background:var(--bot-bubble);border:1px solid var(--border);border-top-left-radius:4px}
  .message.user .bubble{background:var(--user-bubble);border-top-right-radius:4px}
  .case-banner{margin:.5rem 0 0 calc(32px + .75rem);display:inline-flex;align-items:center;gap:.5rem;background:rgba(79,209,165,.1);border:1px solid rgba(79,209,165,.3);border-radius:8px;padding:.4rem .8rem;font-size:.78rem;color:var(--accent);animation:fadeUp .3s ease}
  .typing-dots{display:flex;gap:4px;padding:.85rem 1.1rem;background:var(--bot-bubble);border:1px solid var(--border);border-radius:16px;border-top-left-radius:4px}
  .dot{width:7px;height:7px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite}
  .dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
  .chat-input-area{border-top:1px solid var(--border);padding:1rem 1.25rem;background:var(--surface2);display:flex;gap:.75rem;align-items:flex-end}
  textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.92rem;resize:none;line-height:1.5;max-height:120px;min-height:24px}
  textarea::placeholder{color:var(--muted)}
  .btn-icon{width:38px;height:38px;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;flex-shrink:0}
  .btn-send{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}
  .btn-send:hover{transform:scale(1.05)}.btn-send:disabled{opacity:.4;cursor:default;transform:none}
  .btn-voice{background:var(--surface);border:1px solid var(--border);color:var(--muted)}
  .btn-voice:hover{border-color:var(--accent);color:var(--accent)}
  .btn-voice.recording{background:rgba(248,113,113,.15);border-color:var(--high);color:var(--high);animation:pulse-border 1s infinite}
  @keyframes pulse-border{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}50%{box-shadow:0 0 0 6px rgba(248,113,113,0)}}
  .voice-status{text-align:center;font-size:.78rem;color:var(--high);padding:.3rem 0;display:none}
  .voice-status.visible{display:block}
  .welcome{text-align:center;padding:2.5rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:1rem}
  .welcome-icon{width:64px;height:64px;background:linear-gradient(135deg,rgba(79,209,165,.15),rgba(123,158,244,.15));border:1px solid rgba(79,209,165,.2);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:28px}
  .welcome h2{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:500}
  .welcome p{font-size:.88rem;color:var(--muted);max-width:340px;line-height:1.6}
  .quick-prompts{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-top:.5rem}
  .qp{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:.4rem .9rem;font-size:.8rem;cursor:pointer;color:var(--text);transition:all .2s;font-family:'DM Sans',sans-serif}
  .qp:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">🤝</div>
    <h1>Community<span>Voice</span></h1>
  </div>
  <p class="tagline">Free, confidential assistance — available 24/7</p>
  <a href="/dashboard" class="staff-link">Staff Dashboard →</a>
</header>
<div class="chat-wrap">
  <div class="chat-window">
    <div class="chat-messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🤝</div>
        <h2>How can we help you today?</h2>
        <p>Tell us what you're going through — in your own words, at your own pace. Everything is confidential.</p>
        <div class="quick-prompts">
          <button class="qp" onclick="quickPrompt('I need help finding food')">🥗 Food assistance</button>
          <button class="qp" onclick="quickPrompt('I need help with housing')">🏠 Housing help</button>
          <button class="qp" onclick="quickPrompt('I need help paying my utility bills')">💡 Utilities</button>
          <button class="qp" onclick="quickPrompt('I need help finding a job')">💼 Job search</button>
        </div>
      </div>
    </div>
    <div class="voice-status" id="voiceStatus">🎙 Listening… speak now</div>
    <div class="chat-input-area">
      <textarea id="msgInput" placeholder="Type your message…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-icon btn-voice" id="voiceBtn" onclick="toggleVoice()" title="Speak instead">🎙</button>
      <button class="btn-icon btn-send" id="sendBtn" onclick="sendMessage()" title="Send">↑</button>
    </div>
  </div>
</div>
<script>
let sessionId=null,isTyping=false,recognition=null,isRecording=false;
const messagesEl=document.getElementById('messages');
const inputEl=document.getElementById('msgInput');
const sendBtn=document.getElementById('sendBtn');
const voiceBtn=document.getElementById('voiceBtn');
const voiceStatus=document.getElementById('voiceStatus');
const welcomeEl=document.getElementById('welcome');

async function sendMessage(text){
  const msg=(text||inputEl.value).trim();
  if(!msg||isTyping)return;
  hideWelcome();appendMessage('user',msg);
  inputEl.value='';autoResize(inputEl);
  isTyping=true;sendBtn.disabled=true;
  const typingEl=showTyping();
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,message:msg})});
    const data=await res.json();
    sessionId=data.session_id;
    removeTyping(typingEl);
    appendMessage('bot',data.reply||data.error);
    if(data.case_saved&&data.case_data)appendCaseBanner(data.case_data);
  }catch(e){removeTyping(typingEl);appendMessage('bot','Sorry, there was a connection issue. Please try again.');}
  isTyping=false;sendBtn.disabled=false;
}

function quickPrompt(t){inputEl.value=t;sendMessage(t);}
function hideWelcome(){if(welcomeEl)welcomeEl.style.display='none';}
function appendMessage(role,text){
  const div=document.createElement('div');div.className=`message ${role}`;
  div.innerHTML=`<div class="avatar ${role}">${role==='bot'?'🤝':'👤'}</div><div class="bubble">${escapeHtml(text)}</div>`;
  messagesEl.appendChild(div);scrollBottom();
}
function appendCaseBanner(cd){
  const em={high:'🔴',medium:'🟡',low:'🟢'}[cd.urgency]||'⚪';
  const el=document.createElement('div');el.className='case-banner';
  el.innerHTML=`${em} Case logged — <strong>${cd.need_type}</strong> · ${cd.urgency} urgency`;
  messagesEl.appendChild(el);scrollBottom();
}
function showTyping(){
  const div=document.createElement('div');div.className='message bot typing-indicator';
  div.innerHTML=`<div class="avatar bot">🤝</div><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  messagesEl.appendChild(div);scrollBottom();return div;
}
function removeTyping(el){el?.remove();}
function scrollBottom(){messagesEl.scrollTop=messagesEl.scrollHeight;}
function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function toggleVoice(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){alert('Voice input requires Chrome.');return;}
  if(isRecording){recognition?.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang='en-US';recognition.interimResults=false;
  recognition.onstart=()=>{isRecording=true;voiceBtn.classList.add('recording');voiceBtn.textContent='⏹';voiceStatus.classList.add('visible');};
  recognition.onresult=(e)=>{const t=e.results[0][0].transcript;inputEl.value=t;autoResize(inputEl);sendMessage(t);};
  recognition.onerror=(e)=>console.error('Speech error:',e.error);
  recognition.onend=()=>{isRecording=false;voiceBtn.classList.remove('recording');voiceBtn.textContent='🎙';voiceStatus.classList.remove('visible');};
  recognition.start();
}
</script>
</body>
</html>
