<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommunityVoice — Staff Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #0a2e1e; --green-mid: #1a5c3a; --green-lt: #2ecc8f;
      --cream: #faf8f3; --bg: #f4f1ea; --border: #e5e0d5;
      --text: #1a1a2e; --muted: #8a8585; --red: #e84855;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap { width: 100%; max-width: 400px; padding: 20px; }
    .login-card {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 4px 24px rgba(10,46,30,.08);
    }
    .logo-wrap {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 32px; justify-content: center;
    }
    .logo-icon {
      width: 40px; height: 40px; background: var(--green-lt);
      border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 7px;
    }
    .logo-icon svg { width: 100%; height: 100%; }
    .logo-name { font-size: 17px; font-weight: 600; color: var(--text); }
    .logo-name em { font-style: italic; color: var(--green-mid); }
    .login-title { font-family: 'DM Serif Display', serif; font-size: 24px; text-align: center; margin-bottom: 6px; }
    .login-sub { font-size: 13.5px; color: var(--muted); text-align: center; margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12.5px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    input[type=text], input[type=password] {
      width: 100%; padding: 11px 14px;
      border: 1px solid var(--border); border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 14.5px;
      color: var(--text); background: var(--bg); outline: none; transition: border-color .15s;
    }
    input:focus { border-color: var(--green-mid); }
    .error-msg {
      background: #fee2e2; border: 1px solid #fecaca; color: #991b1b;
      border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
    }
    .login-btn {
      width: 100%; padding: 12px; background: var(--green); color: #fff;
      border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif;
      font-size: 14.5px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: background .15s;
    }
    .login-btn:hover { background: var(--green-mid); }
    .back-link { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); text-decoration: none; }
    .back-link:hover { color: var(--text); }
    .hint {
      margin-top: 20px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px; font-size: 12px; color: var(--muted); text-align: center; line-height: 1.7;
    }
    .hint strong { color: var(--text); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo-wrap">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26C17.81 13.47 19 11.38 19 9c0-3.87-3.13-7-7-7z" fill="#0a2e1e"/>
            <path d="M9 21h6M10 17v4M14 17v4" stroke="#0a2e1e" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="logo-name">Community<em>Voice</em></div>
      </div>
      <div class="login-title">Staff Portal</div>
      <div class="login-sub">Sign in to access the case dashboard and analytics</div>
      {% if error %}
        <div class="error-msg">⚠ {{ error }}</div>
      {% endif %}
      <form method="POST">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="staff" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="login-btn">Sign In →</button>
      </form>
      <a href="/" class="back-link">← Back to community intake portal</a>
      <div class="hint">
        <strong>Demo credentials</strong><br>
        Username: <strong>staff</strong> &nbsp;·&nbsp; Password: <strong>communityvoice2026</strong>
      </div>
    </div>
  </div>
</body>
</html>
